<!DOCTYPE html>
<html lang="it">
<head>
   
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrovaLavoro</title>
    <style>
        :root {
            --bg-base: #0a0a0f;
            --neon-accent: #00e5ff;
            --neon-glow: rgba(0, 229, 255, 0.4);
            --panel-bg: rgba(255, 255, 255, 0.03);
            --text-main: #e0e0e0;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Header */
        header {
            text-align: center;
            padding: 15px;
            background: linear-gradient(180deg, rgba(0,229,255,0.1) 0%, rgba(10,10,15,1) 100%);
            border-bottom: 1px solid rgba(0, 229, 255, 0.2);
            box-shadow: 0 4px 15px var(--neon-glow);
            z-index: 10;
            flex-shrink: 0;
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #fff;
            text-shadow: 0 0 8px var(--neon-accent);
        }

        /* Aree Monetizzazione */
        .ad-space {
            width: 100%;
            height: 90px;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #222;
            color: #555;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            flex-shrink: 0;
        }

        /* Sistema a Schede */
        .tabs-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 20px;
            background: var(--bg-base);
            flex-shrink: 0;
        }

        .tab-btn {
            background: var(--panel-bg);
            border: 1px solid #333;
            color: #aaa;
            padding: 10px 30px;
            font-size: 0.9rem;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .tab-btn:hover {
            color: #fff;
            border-color: #555;
        }

        .tab-btn.active {
            background: rgba(0, 229, 255, 0.1);
            color: #fff;
            border-color: var(--neon-accent);
            box-shadow: 0 0 12px var(--neon-glow);
            text-shadow: 0 0 5px #fff;
        }

        /* Visore Iframe Centrale */
        .viewer-container {
            flex-grow: 1;
            padding: 0 20px 20px 20px;
            display: flex;
            justify-content: center;
        }

        .iframe-wrapper {
            width: 100%;
            max-width: 1200px;
            background: var(--panel-bg);
            border: 1px solid var(--neon-accent);
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            position: relative;
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #ffffff;
        }
    </style>
</head>
<body>

    <header>
        <h1>Work Hub System</h1>
    </header>

    <!-- Slot Monetizzazione (es. Monetag/Adsterra) -->
    <div class="ad-space">
        [ Inserisci qui lo script del banner ]
    </div>

    <!-- Selettore Schede -->
    <div class="tabs-container">
        <button class="tab-btn active" onclick="switchPlatform('https://it.jobrapido.com/', this)">Jobrapido</button>
        <button class="tab-btn" onclick="switchPlatform('https://it.talent.com/', this)">Talent.com</button>
        <button class="tab-btn" onclick="switchPlatform('https://www.cercolavoro.com/', this)">CercoLavoro</button>
    </div>

    <!-- Visore Centrale -->
    <div class="viewer-container">
        <div class="iframe-wrapper">
            <iframe id="main-frame" src="https://it.jobrapido.com/" title="Work Platform"></iframe>
        </div>
    </div>

    <script>
        function switchPlatform(url, element) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            document.getElementById('main-frame').src = url;
        }
    </script>

</body>
</html>
